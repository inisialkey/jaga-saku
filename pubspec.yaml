name: jaga_saku
description: "Flutter Clean Architecture starter template."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your app.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9

  # Rounded, offline icon font for category / account icons (style guide §12).
  # Resolved via the shared AppIcons catalog (lib/core/resources/app_icons.dart).
  iconsax: ^0.0.8

  # Open external URLs (e.g. Play Store / App Store listings from settings later)
  url_launcher: ^6.3.0

  # Functional programming (Either<Failure, T>, Unit) — maintained dartz replacement
  fpdart: ^1.2.0

  # Value equality for Failure / value objects (no hand-rolled ==/hashCode)
  equatable: ^2.1.0

  # Local relational storage (offline-first finance data)
  sqflite: ^2.4.3
  path: ^1.9.0

  # Charts (donut / bar / line for insights)
  fl_chart: ^1.1.1

  # Use for Dependencies Injection
  get_it: ^9.2.1

  # Use for State Management with BLoC pattern
  flutter_bloc: ^9.1.1

  # Use for custom toast with Status, ex:Loading,Success,Failed
  oktoast: ^3.4.0

  # Use for responsive UI, set default size base on Mock Up
  flutter_screenutil: ^5.9.3

  # logger
  logger: ^2.6.1

  # router
  go_router: ^17.3.0

  # Freezed
  freezed_annotation: ^3.1.0

  flutter_native_splash: ^2.4.8

  intl: ^0.20.2

  # Offline month-grid calendar for the transactions ledger (M2, style guide §2)
  table_calendar: ^3.2.0

  # Reads the app name / version at runtime for the About screen (M6, offline —
  # never hardcode the version). Held at 9.x: every 10.x pulls win32 ^6.0.x, which
  # no STABLE file_picker/share_plus can match (they need win32 5.x) and won't
  # compile against — their Windows impls compile even for Android builds, and the
  # only win32-6 file_picker is a pre-release (12.0.0-beta.1). Keeping all three
  # plugins on stable + win32 5.x is worth this downgrade; only the stable
  # PackageInfo.fromPlatform() is used (about_page.dart), unchanged since 4.x.
  package_info_plus: ^9.0.1

  # Camera + gallery picker for receipt attachment (V2-M4). image_picker handles
  # its own runtime permission prompts — no permission_handler (YAGNI).
  image_picker: ^1.1.2

  # Resolves <app-docs> so receipts persist under <docs>/receipts/ as relative
  # paths (resolved at read; survives iOS container migration).
  path_provider: ^2.1.5
  # Restore = pick a backup JSON (V3-M1). 11.x uses the Android v2 embedding
  # (3.0.4, the win32-free version pub first picked, uses the removed v1 embedding
  # and fails `build apk`). Co-resolves with package_info_plus held at 10.0.x —
  # see the win32 note above.
  file_picker: ^11.0.0
  # Export delivery = system share sheet (V3-M1). Held at 11.x: 13.x needs
  # win32 ^6.0.1 (incompatible with file_picker's win32 5.x, and both compile
  # their Windows impl even for Android). 11.x uses win32 ^5.5.3 and exposes the
  # same SharePlus.instance.share(ShareParams(...)) API as 13.x.
  share_plus: ^11.1.0

  # Salted SHA-256 PIN hash at rest (V3-M4 App Lock). 10.3.1 pulls
  # flutter_secure_storage_windows 4.1.0, which co-resolves with win32 5.x —
  # pub holds it there instead of 4.2.2 (needs win32 6.x) because file_picker /
  # share_plus above pin the win32 5.x camp. So this ADD did NOT bump win32
  # (stayed 5.15.0); no manual pin needed as long as those two pins hold.
  flutter_secure_storage: ^10.3.1
  # Biometric accelerator for the App Lock (Face ID / fingerprint). PIN stays
  # the base unlock — biometric is opt-in and falls back to PIN silently.
  # local_auth_windows carries no win32 dep, so it doesn't touch the camp.
  local_auth: ^3.0.2
  # Promoted transitive -> direct: the salted SHA-256 PinHasher imports
  # `package:crypto/crypto.dart` directly (was only pulled in transitively).
  crypto: ^3.0.7

  # Local reminder notifications (V3-M5): daily check-in, recurring-due and
  # budget-warning nudges. No server push / FCM (Firebase is fully removed).
  # 22.0.1 (latest) co-resolves on win32 5.15.0 — its Windows impl
  # (flutter_local_notifications_windows 3.1.1) does NOT pull win32 6.x, so the
  # win32 5.x camp (file_picker / share_plus, see the package_info_plus note
  # above) holds and this ADD did NOT bump win32 (confirmed via
  # `pub add --dry-run`). No manual pin needed. Uses inexact allowWhileIdle
  # scheduling (no SCHEDULE_EXACT_ALARM) + app-open reconcile; v22's desugaring
  # requirement is met by the existing desugar_jdk_libs:2.1.4 (build.gradle.kts).
  flutter_local_notifications: ^22.1.0
  # Timezone-aware scheduling for the above (zonedSchedule). Pure Dart, no
  # native code — hardcoded to Asia/Jakarta (WIB, no DST) at bootstrap.
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  lint: ^2.8.0
  bloc_test: ^10.0.0
  build_runner: ^2.15.1

  # In-memory / FFI sqflite for DB tests off-device
  sqflite_common_ffi: ^2.4.2

  # Codegen-free mocks (also a bloc_test transitive dep). Standardized across
  # the suite — mockito is intentionally not used.
  mocktail: ^1.0.4

  # Freezed
  freezed: ^3.2.3
  alchemist: ^0.14.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
