name: jaga_saku
description: "Flutter Clean Architecture starter template."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your app.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Rounded, offline icon font for category / account icons (style guide §12).
  # Resolved via the shared AppIcons catalog (lib/core/resources/app_icons.dart).
  iconsax: ^0.0.8

  # Open external URLs (e.g. Play Store / App Store listings from settings later)
  url_launcher: ^6.3.0

  # Functional programming (Either<Failure, T>, Unit) — maintained dartz replacement
  fpdart: ^1.2.0

  # Value equality for Failure / value objects (no hand-rolled ==/hashCode)
  equatable: ^2.0.7

  # Local relational storage (offline-first finance data)
  sqflite: ^2.4.1
  path: ^1.9.0

  # Charts (donut / bar / line for insights)
  fl_chart: ^1.1.1

  # Use for Dependencies Injection
  get_it: ^9.2.1

  # Use for State Management with BLoC pattern
  flutter_bloc: ^9.1.1

  # Use for custom toast with Status, ex:Loading,Success,Failed
  oktoast: ^3.4.0

  # Use for responsive UI, set default size base on Mock Up
  flutter_screenutil: ^5.9.3

  # logger
  logger: ^2.6.1

  # router
  go_router: ^17.3.0

  # Freezed
  freezed_annotation: ^3.1.0

  flutter_native_splash: ^2.4.8

  intl: ^0.20.2

  # Offline month-grid calendar for the transactions ledger (M2, style guide §2)
  table_calendar: ^3.2.0

  # Reads the app name / version at runtime for the About screen (M6, offline —
  # never hardcode the version).
  package_info_plus: ^10.2.0

  # Camera + gallery picker for receipt attachment (V2-M4). image_picker handles
  # its own runtime permission prompts — no permission_handler (YAGNI).
  image_picker: ^1.1.2

  # Resolves <app-docs> so receipts persist under <docs>/receipts/ as relative
  # paths (resolved at read; survives iOS container migration).
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  lint: ^2.8.0
  bloc_test: ^10.0.0
  build_runner: ^2.15.1

  # In-memory / FFI sqflite for DB tests off-device
  sqflite_common_ffi: ^2.3.4

  # Codegen-free mocks (also a bloc_test transitive dep). Standardized across
  # the suite — mockito is intentionally not used.
  mocktail: ^1.0.4

  # Freezed
  freezed: ^3.2.3
  alchemist: ^0.14.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
