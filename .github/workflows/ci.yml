name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, 'release/**']

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Analyze · Format · Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      # Fail fast if intl_en.arb / intl_id.arb drift out of key parity (Rule 11).
      - name: ARB key parity
        run: dart run scripts/check_arb_parity.dart

      - name: Localization
        run: flutter gen-l10n

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Static analysis
        run: flutter analyze

      - name: Tests + coverage
        run: flutter test --coverage --exclude-tags broken

      # Coverage gate. Generated/mocks excluded so the number reflects hand-written code.
      # Floor is intentionally modest (UI/widget tests are sparse in the starter) —
      # raise min_coverage as you add widget/integration tests.
      - name: Coverage gate
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 40
          exclude: '**/*.g.dart **/*.freezed.dart **/*.mocks.dart **/*.config.dart **/generated/**'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7

  build-dev:
    name: Build dev APK
    runs-on: ubuntu-latest
    needs: analyze-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Localization
        run: flutter gen-l10n

      # Catches Gradle / manifest / flavor / plugin breakage that the Dart-only
      # analyze-test job can't (e.g. the build.gradle.kts + desugaring fixes).
      - name: Build dev APK (debug)
        run: flutter build apk --flavor dev --debug --dart-define-from-file=.env.dev.json

  build-ios:
    name: Build dev iOS
    runs-on: macos-latest
    needs: analyze-test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Localization
        run: flutter gen-l10n

      # Flutter 3.44 enables Swift Package Manager by default, but this
      # project's plugins are integrated via CocoaPods. Keep SPM disabled so
      # `pod install` resolves them (removing this risks an SPM-vs-CocoaPods
      # break in the iOS build, unrelated to app code).
      - name: Use CocoaPods (disable Swift Package Manager)
        run: flutter config --no-enable-swift-package-manager

      # Catches CocoaPods / Swift / Xcode / plugin breakage the Android-only
      # build can't. --no-codesign: no signing certs/provisioning needed in CI.
      - name: Build dev iOS (debug, no codesign)
        run: flutter build ios --flavor dev --debug --no-codesign --dart-define-from-file=.env.dev.json
